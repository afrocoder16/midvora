name: Deploy root site to cPanel

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-cpanel.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cpanel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build Astro site and upload to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify build output
        run: test -f dist/index.html

      - name: Upload dist to cPanel over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ secrets.CPANEL_FTP_PORT }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ secrets.CPANEL_FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
